<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Måltids ekonomi</title>
    <style>
        /* CSS är oförändrad från tidigare version */
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; color: #333; max-width: 600px; margin: 0 auto; padding: 20px; }
        h1 { text-align: center; color: #2c3e50; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .form-group { display: flex; gap: 10px; margin-bottom: 15px; }
        input[type="text"], input[type="number"], input[type="date"] { padding: 10px; border: 1px solid #ccc; border-radius: 4px; flex: 1; }
        button { padding: 10px 15px; background-color: #27ae60; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #2ecc71; }
        .btn-danger { background-color: #e74c3c; }
        .btn-danger:hover { background-color: #c0392b; }
        .btn-warning { background-color: #f39c12; }
        .btn-warning:hover { background-color: #d68910; }
        #status-display { font-size: 1.1em; font-weight: bold; padding: 15px; border-radius: 4px; background-color: #ecf0f1; margin-top: 10px; }
        .food-item { border-bottom: 1px solid #eee; padding-bottom: 15px; margin-bottom: 15px; }
        .food-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .food-header h3 { margin: 0; color: #34495e; }
        .portions-list { display: flex; flex-direction: column; gap: 8px; padding-left: 10px; }
        .portion-label { background: #f9f9f9; padding: 8px; border-radius: 4px; cursor: pointer; display: flex; align-items: center; }
        .portion-label input { margin-right: 10px; transform: scale(1.2); }
                /* --- NY KOD FÖR MOBILANPASSNING --- */
        @media (max-width: 500px) {
            .form-group {
                flex-direction: column; /* Staplar elementen ovanpå varandra */
            }
            .form-group input, .form-group button {
                width: 100%; /* Gör så att fält och knappar fyller hela bredden */
                box-sizing: border-box; /* Ser till att marginaler inte gör dem för breda */
            }
        }

    </style>
</head>
<body>

    <h1>Måltids ekonomi</h1>

    <div class="card">
        <h3>Ekonomistatus</h3>
        <div class="form-group">
            <label style="flex:1; display:flex; align-items:center;">
                Nästa lönedag:&nbsp; 
                <input type="date" id="payday" onchange="updateUI()">
            </label>
        </div>
        <div id="status-display">Fyll i nästa lönedag för att se prognos.</div>
    </div>

    <div class="card">
        <h3>Lägg till matvara</h3>
        <div class="form-group">
            <input type="text" id="food-name" placeholder="T.ex. Falukorv">
            <input type="number" id="food-portions" placeholder="Antal portioner" min="1">
            <button onclick="addFood()">Lägg till</button>
        </div>
    </div>

    <div class="card" id="food-list-container">
        <h3>Mina Portioner</h3>
        <div id="food-list"></div>
    </div>

    <script>
        let foods = [];

        // --- NY FUNKTION: Ladda sparad data när appen startar ---
        function loadData() {
            // Hämta sparad mat från webbläsarens minne
            const savedFoods = localStorage.getItem('maltidsEkonomi_foods');
            if (savedFoods) {
                foods = JSON.parse(savedFoods); // Översätt från text (JSON) tillbaka till en lista
            }

            // Hämta sparat datum
            const savedPayday = localStorage.getItem('maltidsEkonomi_payday');
            if (savedPayday) {
                document.getElementById('payday').value = savedPayday;
            }
        }

        // --- NY FUNKTION: Spara all data till webbläsarens minne ---
        function saveData() {
            // Översätt matlistan till text (JSON) och spara
            localStorage.setItem('maltidsEkonomi_foods', JSON.stringify(foods));
            
            // Spara det valda datumet
            const payday = document.getElementById('payday').value;
            localStorage.setItem('maltidsEkonomi_payday', payday);
        }

        function addFood() {
            const nameInput = document.getElementById('food-name');
            const portionsInput = document.getElementById('food-portions');
            const name = nameInput.value.trim();
            const portions = parseInt(portionsInput.value);

            if (name === "" || isNaN(portions) || portions <= 0) {
                alert("Vänligen ange ett giltigt namn och minst 1 portion.");
                return;
            }

            const newFood = {
                id: Date.now(),
                name: name,
                initialPortions: portions,
                portionsLeft: portions
            };
            
            foods.push(newFood);
            nameInput.value = '';
            portionsInput.value = '';

            updateUI();
        }

        function consumePortion(id) {
            const food = foods.find(f => f.id === id);
            if (food && food.portionsLeft > 0) {
                food.portionsLeft--;
                updateUI();
            }
        }

        function resetFood(id) {
            const food = foods.find(f => f.id === id);
            if (food) {
                food.portionsLeft = food.initialPortions;
                updateUI();
            }
        }

        function deleteFood(id) {
            foods = foods.filter(f => f.id !== id);
            updateUI();
        }

        // --- UPPDATERAD FUNKTION: updateUI sparar nu också datan varje gång något ändras ---
        function updateUI() {
            renderList();
            calculateStatus();
            saveData(); // <--- Nytt steg: Spara alltid efter att skärmen uppdaterats!
        }

        function renderList() {
            const listDiv = document.getElementById('food-list');
            listDiv.innerHTML = ''; 

            if (foods.length === 0) {
                listDiv.innerHTML = '<p style="color:#7f8c8d;">Inga matvaror tillagda än.</p>';
                return;
            }

            foods.forEach(food => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'food-item';

                itemDiv.innerHTML = `
                    <div class="food-header">
                        <h3>${food.name} (${food.portionsLeft}/${food.initialPortions} kvar)</h3>
                        <div>
                            <button class="btn-warning" onclick="resetFood(${food.id})">Återställ</button>
                            <button class="btn-danger" onclick="deleteFood(${food.id})">Radera</button>
                        </div>
                    </div>
                `;

                const portionsDiv = document.createElement('div');
                portionsDiv.className = 'portions-list';
                
                for (let i = 0; i < food.portionsLeft; i++) {
                    const label = document.createElement('label');
                    label.className = 'portion-label';
                    
                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.onclick = () => consumePortion(food.id);
                    
                    label.appendChild(checkbox);
                    label.appendChild(document.createTextNode(`1 portion ${food.name}`));
                    portionsDiv.appendChild(label);
                }

                itemDiv.appendChild(portionsDiv);
                listDiv.appendChild(itemDiv);
            });
        }

        function calculateStatus() {
            const paydayInput = document.getElementById('payday').value;
            const displayDiv = document.getElementById('status-display');
            
            let totalPortionsLeft = foods.reduce((sum, food) => sum + food.portionsLeft, 0);

            if (!paydayInput) {
                displayDiv.innerHTML = `Totalt <strong>${totalPortionsLeft}</strong> portioner kvar. Fyll i lönedag för prognos.`;
                return;
            }

            const today = new Date();
            today.setHours(0, 0, 0, 0); 
            
            const paydayDate = new Date(paydayInput);
            paydayDate.setHours(0, 0, 0, 0);

            const msPerDay = 1000 * 60 * 60 * 24;
            const diffTime = paydayDate - today;
            const daysLeft = Math.ceil(diffTime / msPerDay);

            if (daysLeft < 0) {
                displayDiv.innerHTML = "Lönedagen har redan passerat. Välj ett framtida datum!";
                displayDiv.style.backgroundColor = "#ffcccc";
                return;
            }

            const diff = totalPortionsLeft - daysLeft;
            
            let statusHtml = `Dagar till lön: <strong>${daysLeft}</strong><br>`;
            statusHtml += `Totala portioner mat: <strong>${totalPortionsLeft}</strong><br><br>`;

            if (diff > 0) {
                statusHtml += `🎉 <strong>Överskott:</strong> Du har ${diff} portion(er) mer än dagar kvar!`;
                displayDiv.style.backgroundColor = "#d5f5e3"; 
            } else if (diff < 0) {
                statusHtml += `⚠️ <strong>Underskott:</strong> Du saknar ${Math.abs(diff)} portion(er) för att klara dig till lön!`;
                displayDiv.style.backgroundColor = "#fadbd8"; 
            } else {
                statusHtml += `✅ <strong>Jämnt:</strong> Du har exakt en portion per dag till lönen kommer. Snyggt!`;
                displayDiv.style.backgroundColor = "#d6eaf8"; 
            }

            displayDiv.innerHTML = statusHtml;
        }

        // --- NÄR SIDAN LADDAS ---
        loadData(); // 1. Ladda eventuell sparad data från minnet
        updateUI(); // 2. Rita upp skärmen med datan
    </script>
</body>
</html>
