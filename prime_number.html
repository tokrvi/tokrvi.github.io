<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Primtalsanalys - CSV med Sekvensdata</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #eee; padding: 20px; }
        .controls { background: #2a2a2a; padding: 15px; border-radius: 8px; margin-bottom: 10px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        
        #gap-scroll-screen { 
            background: #000; 
            color: #00ffcc; 
            padding: 15px; 
            border-radius: 8px; 
            height: 250px; 
            overflow-y: scroll; 
            font-family: 'Courier New', monospace; 
            margin-bottom: 20px;
            border: 1px solid #444;
            line-height: 1.6;
        }

        #chart-container { 
            background: #2a2a2a; padding: 20px; border-radius: 8px; height: 350px; border: 1px solid #444; 
        }

        .status-bar { margin-bottom: 10px; font-size: 0.9em; }
        .counter-highlight { color: yellow; font-weight: bold; }
        .seq-count-tag { color: yellow; font-weight: bold; margin-left: 10px; font-size: 0.85em; }
        
        input { padding: 8px; border-radius: 4px; border: 1px solid #444; background: #333; color: white; width: 120px; }
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 5px; color: white; font-weight: bold; }
        #startBtn { background: #007bff; }
        #exportBtn { background: #28a745; }
        .gap-2 { color: #ff3366; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Primtalsanalys & Utökad CSV-Data</h1>
    
    <div class="controls">
        <label>Starta från:</label>
        <input type="number" id="startFrom" value="3">
        <button onclick="toggleGenerator()" id="startBtn">Starta</button>
        <button onclick="exportToCSV()" id="exportBtn">Exportera CSV</button>
    </div>

    <div class="status-bar">
        Senaste primtal: <span id="currentP">-</span> | 
        Totalt antal: <span id="countP">0</span> | 
        Nuvarande sekvens: <span id="seqCounter" class="counter-highlight">0</span> gap
    </div>

    <h3>Gap-sekvens (Bryts vid gap 2)</h3>
    <div id="gap-scroll-screen">
        <div id="gap-lines"></div>
    </div>

    <div id="chart-container">
        <canvas id="gapChart"></canvas>
    </div>

    <script>
        let lastPrime = 2;
        let currentNum = 3;
        let gapFrequencies = {}; 
        let exportData = []; // Lagrar {index, prime, gap, seqLength}
        let running = false;
        let interval;
        let chart;
        let primeCount = 0;
        let currentLineGaps = [];

        window.onload = function() {
            const ctx = document.getElementById('gapChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'Förekomst av differentialer (Gap)',
                        data: [],
                        backgroundColor: '#00ffcc'
                    }]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false,
                    scales: { 
                        y: { beginAtZero: true, grid: { color: '#444' } },
                        x: { title: { display: true, text: 'Differential-värde', color: '#eee' } }
                    }
                }
            });
        };

        function isPrime(n) {
            if (n < 2) return false;
            if (n === 2) return true;
            if (n % 2 === 0) return false;
            for (let i = 3, s = Math.sqrt(n); i <= s; i += 2)
                if (n % i === 0) return false;
            return true;
        }

        function generateNext() {
            if (isPrime(currentNum)) {
                let gap = currentNum - lastPrime;
                primeCount++;
                
                const screen = document.getElementById('gap-lines');
                const counterDisplay = document.getElementById('seqCounter');
                let seqLengthForCSV = "";

                if (gap === 2) {
                    let numGaps = currentLineGaps.length;
                    seqLengthForCSV = numGaps; // Spara längden för CSV-raden
                    
                    let lineText = currentLineGaps.join(",");
                    screen.innerHTML += `<div>${lineText}${lineText ? ', ' : ''}<span class="gap-2">2</span> <span class="seq-count-tag">[${numGaps} gap]</span></div>`;
                    
                    currentLineGaps = [];
                    counterDisplay.innerText = "0";
                    
                    const container = document.getElementById('gap-scroll-screen');
                    container.scrollTop = container.scrollHeight;
                } else {
                    currentLineGaps.push(gap);
                    counterDisplay.innerText = currentLineGaps.length;
                    seqLengthForCSV = ""; // Lämna tomt om sekvensen inte är slut
                }

                // Spara data till exportlistan inklusive sekvenslängden vid gap 2
                exportData.push({
                    index: primeCount, 
                    prime: currentNum, 
                    gap: gap, 
                    seqLength: seqLengthForCSV
                });

                gapFrequencies[gap] = (gapFrequencies[gap] || 0) + 1;
                updateChart();

                document.getElementById('currentP').innerText = currentNum;
                document.getElementById('countP').innerText = primeCount;
                lastPrime = currentNum;
            }
            currentNum += (currentNum === 2) ? 1 : 2;
        }

        function updateChart() {
            const sortedGaps = Object.keys(gapFrequencies).sort((a, b) => Number(a) - Number(b));
            chart.data.labels = sortedGaps;
            chart.data.datasets[0].data = sortedGaps.map(g => gapFrequencies[g]);
            chart.update('none');
        }

        function toggleGenerator() {
            if (!running) {
                let startVal = parseInt(document.getElementById('startFrom').value);
                if (currentNum !== startVal) {
                    currentNum = startVal;
                    lastPrime = findPreviousPrime(currentNum);
                    document.getElementById('gap-lines').innerHTML = "";
                    currentLineGaps = [];
                    exportData = []; // Nollställ data vid ny startpunkt
                    document.getElementById('seqCounter').innerText = "0";
                }
                running = true;
                document.getElementById('startBtn').innerText = "Pausa";
                document.getElementById('startBtn').style.background = "#dc3545";
                interval = setInterval(generateNext, 5);
            } else {
                running = false;
                document.getElementById('startBtn').innerText = "Starta";
                document.getElementById('startBtn').style.background = "#007bff";
                clearInterval(interval);
            }
        }

        function findPreviousPrime(n) {
            for (let i = n - 1; i >= 2; i--) {
                if (isPrime(i)) return i;
            }
            return 2;
        }

        function exportToCSV() {
            if (exportData.length === 0) return;
            
            // Ny header med SekvensLangd
            let csvContent = "data:text/csv;charset=utf-8,Index,Primtal,Gap,SekvensLangd\n";
            
            exportData.forEach(row => { 
                csvContent += `${row.index},${row.prime},${row.gap},${row.seqLength}\n`; 
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `primtal_analys_${currentNum}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
