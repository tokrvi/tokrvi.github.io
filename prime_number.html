<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primtalsgenerator & Gapsanalys</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 30px;
        }
        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .input-group {
            display: flex;
            flex-direction: column;
        }
        label {
            font-size: 0.85rem;
            color: #7f8c8d;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 1rem;
            width: 140px;
        }
        button {
            padding: 11px 20px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn-generate {
            background-color: #2ecc71;
            color: white;
        }
        .btn-generate:hover { background-color: #27ae60; }
        .btn-export {
            background-color: #3498db;
            color: white;
        }
        .btn-export:hover { background-color: #2980b9; }
        
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-top: 25px;
        }
        @media (max-width: 800px) {
            .dashboard { grid-template-columns: 1fr; }
        }
        
        .table-wrapper {
            max-height: 500px;
            overflow-y: auto;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        th, td {
            padding: 12px 15px;
            border-bottom: 1px solid #e0e0e0;
        }
        th {
            background-color: #f8f9fa;
            position: sticky;
            top: 0;
            color: #34495e;
            font-weight: 600;
        }
        tr:hover { background-color: #f1f2f6; }
        
        .chart-wrapper {
            background: #fbfbfb;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .break-highlight {
            color: #e74c3c;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Primtalsgenerator med Gapsanalys</h1>
    
    <div class="controls">
        <div class="input-group">
            <label for="startValue">Startvärde:</label>
            <input type="number" id="startValue" value="2" min="2">
        </div>
        <div class="input-group">
            <label for="count">Antal primtal:</label>
            <input type="number" id="count" value="100" min="1">
        </div>
        <div class="input-group" style="padding-top: 20px;">
            <button class="btn-generate" onclick="generatePrimes()">Generera</button>
        </div>
        <div class="input-group" style="padding-top: 20px;">
            <button class="btn-export" id="exportBtn" onclick="exportToCSV()" style="display:none;">Exportera till CSV</button>
        </div>
    </div>

    <div class="dashboard">
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Index</th>
                        <th>Primtal</th>
                        <th>Gap</th>
                    </tr>
                </thead>
                <tbody id="primeTableBody">
                    <tr>
                        <td colspan="3" style="text-align:center; color:#999;">Klicka på Generera för att starta...</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="chart-wrapper">
            <canvas id="gapChart"></canvas>
        </div>
    </div>
</div>

<script>
    let generatedData = []; // Sparar datan globalt för export
    let gapChartInstance = null; // Håller reda på diagrammet så det kan nollställas

    // Funktion för att kontrollera om ett tal är ett primtal
    function isPrime(num) {
        if (num <= 1) return false;
        if (num === 2) return true;
        if (num % 2 === 0) return false;
        for (let i = 3; i <= Math.sqrt(num); i += 2) {
            if (num % i === 0) return false;
        }
        return true;
    }

    function generatePrimes() {
        const startValue = parseInt(document.getElementById('startValue').value) || 2;
        const countRequested = parseInt(document.getElementById('count').value) || 100;
        
        generatedData = [];
        let currentNum = startValue;
        let lastPrime = null;
        let primeIndex = 1;

        // Om vi startar högre än 2, måste vi ta reda på vad det faktiska indexet är för att det ska bli matematiskt korrekt.
        // För enkelhetens och prestandans skull i denna app låter vi indexet starta på 1 från ditt valda startvärde.
        
        // Hitta först det föregående primtalet utanför vårt fönster för att kunna räkna ut det allra första gapet korrekt
        if (startValue > 2) {
            for (let i = startValue - 1; i >= 2; i--) {
                if (isPrime(i)) {
                    lastPrime = i;
                    break;
                }
            }
        }

        // Loopa tills vi hittat önskat antal primtal
        while (generatedData.length < countRequested) {
            if (isPrime(currentNum)) {
                let gap = "-";
                if (lastPrime !== null) {
                    gap = currentNum - lastPrime;
                }

                generatedData.push({
                    index: primeIndex,
                    prime: currentNum,
                    gap: gap
                });

                lastPrime = currentNum;
                primeIndex++;
            }
            currentNum++;
        }

        renderTable();
        renderChart();
        document.getElementById('exportBtn').style.display = 'inline-block';
    }

    function renderTable() {
        const tbody = document.getElementById('primeTableBody');
        tbody.innerHTML = "";

        generatedData.forEach((row) => {
            const tr = document.createElement('tr');
            
            // Markera sekvensbrott där gapet inte längre är ett "tvillinggap" (2) som extra visuell detalj
            const gapClass = row.gap > 2 && row.gap !== "-" ? "class='break-highlight'" : "";

            tr.innerHTML = `
                <td>${row.index}</td>
                <td>${row.prime}</td>
                <td ${gapClass}>${row.gap}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    function renderChart() {
        const ctx = document.getElementById('gapChart').getContext('2d');
        
        // Räkna ut frekvensen av varje gap
        const gapCounts = {};
        generatedData.forEach(row => {
            if (row.gap !== "-") {
                gapCounts[row.gap] = (gapCounts[row.gap] || 0) + 1;
            }
        });

        // Sortera gap-storlekarna numeriskt för x-axeln
        const labels = Object.keys(gapCounts).sort((a, b) => a - b);
        const data = labels.map(label => gapCounts[label]);

        // Om ett diagram redan finns, förstör det innan vi ritar ett nytt
        if (gapChartInstance) {
            gapChartInstance.destroy();
        }

        gapChartInstance = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Antal förekomster av gapet',
                    data: data,
                    backgroundColor: 'rgba(52, 152, 219, 0.7)',
                    borderColor: 'rgba(52, 152, 219, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    title: {
                        display: true,
                        text: 'Frekvens av primtalsgap (Histogram)'
                    }
                },
                scales: {
                    x: { title: { display: true, text: 'Gapets storlek' } },
                    y: { title: { display: true, text: 'Antal' }, beginAtZero: true }
                }
            }
        });
    }

    function exportToCSV() {
        if (generatedData.length === 0) return;

        let csvContent = "data:text/csv;charset=utf-8,Index,Primtal,Gap\n";
        
        generatedData.forEach(row => {
            csvContent += `${row.index},${row.prime},${row.gap}\n`;
        });

        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `primtalsdata_start_${document.getElementById('startValue').value}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>

</body>
</html>
