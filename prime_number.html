<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Primtalsanalys - Gap-mönster</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #eee; padding: 20px; }
        .controls { background: #2a2a2a; padding: 15px; border-radius: 8px; margin-bottom: 10px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        
        #gap-scroll-screen { 
            background: #000; 
            color: #00ffcc; 
            padding: 15px; 
            border-radius: 8px; 
            height: 800px; 
            overflow-y: scroll; 
            font-family: 'Courier New', monospace; 
            margin-bottom: 20px;
            border: 1px solid #444;
            line-height: 1.4;
        }

        #chart-container { 
            background: #2a2a2a; padding: 20px; border-radius: 8px; height: 350px; border: 1px solid #444; 
        }

        input { padding: 8px; border-radius: 4px; border: 1px solid #444; background: #333; color: white; width: 120px; }
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 5px; color: white; font-weight: bold; }
        #startBtn { background: #007bff; }
        #exportBtn { background: #28a745; }
        .gap-2 { color: #ff3366; font-weight: bold; } /* Markera radbrytaren */
    </style>
</head>
<body>

    <h1>Primtalsanalys & Gap-sekvenser</h1>
    
    <div class="controls">
        <label>Starta från:</label>
        <input type="number" id="startFrom" value="3">
        <button onclick="toggleGenerator()" id="startBtn">Starta</button>
        <button onclick="exportToCSV()" id="exportBtn">Exportera CSV</button>
    </div>

    <div id="status">
        Senaste primtal: <span id="currentP">-</span> | Antal: <span id="countP">0</span>
    </div>

    <h3>Gap-sekvens (Bryts vid gap 2)</h3>
    <div id="gap-scroll-screen">
        <div id="gap-lines"><em>Klicka på start för att generera mönster...</em></div>
    </div>

    <div id="chart-container">
        <canvas id="gapChart"></canvas>
    </div>

    <script>
        let lastPrime = 2;
        let currentNum = 3;
        let gapFrequencies = {}; 
        let exportData = [];
        let running = false;
        let interval;
        let chart;
        let primeCount = 0;
        let currentLineGaps = [];

        window.onload = function() {
            const ctx = document.getElementById('gapChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'Förekomst av differentialer (Gap)',
                        data: [],
                        backgroundColor: '#00ffcc'
                    }]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false,
                    scales: { 
                        y: { beginAtZero: true, grid: { color: '#444' } },
                        x: { title: { display: true, text: 'Differential-värde', color: '#eee' } }
                    }
                }
            });
        };

        function isPrime(n) {
            if (n < 2) return false;
            if (n === 2) return true;
            if (n % 2 === 0) return false;
            for (let i = 3, s = Math.sqrt(n); i <= s; i += 2)
                if (n % i === 0) return false;
            return true;
        }

        function generateNext() {
            if (isPrime(currentNum)) {
                let gap = currentNum - lastPrime;
                primeCount++;
                
                // Exportera data
                exportData.push({index: primeCount, prime: currentNum, gap: gap});

                // Uppdatera graf-statistik
                gapFrequencies[gap] = (gapFrequencies[gap] || 0) + 1;
                updateChart();

                // Hantera rullskärm och radbrytning vid gap 2
                const screen = document.getElementById('gap-lines');
                if (primeCount === 1) screen.innerHTML = ""; // Rensa placeholder vid start

                if (gap === 2) {
                    // Om gapet är 2, avsluta nuvarande rad och påbörja ny
                    let lineText = currentLineGaps.join(", ");
                    if (lineText) {
                        screen.innerHTML += `<div>${lineText}, <span class="gap-2">2</span></div>`;
                    } else {
                        screen.innerHTML += `<div><span class="gap-2">2</span></div>`;
                    }
                    currentLineGaps = [];
                    // Autoscroll till botten
                    const container = document.getElementById('gap-scroll-screen');
                    container.scrollTop = container.scrollHeight;
                } else {
                    // Annars lägg till gapet i nuvarande sekvens
                    currentLineGaps.push(gap);
                }

                document.getElementById('currentP').innerText = currentNum;
                document.getElementById('countP').innerText = primeCount;
                lastPrime = currentNum;
            }
            currentNum += (currentNum === 2) ? 1 : 2;
        }

        function updateChart() {
            const sortedGaps = Object.keys(gapFrequencies).sort((a, b) => Number(a) - Number(b));
            chart.data.labels = sortedGaps;
            chart.data.datasets[0].data = sortedGaps.map(g => gapFrequencies[g]);
            chart.update('none');
        }

        function toggleGenerator() {
            if (!running) {
                // Om vi startar om, hämta värdet från boxen
                let startVal = parseInt(document.getElementById('startFrom').value);
                if (currentNum === 3 || currentNum !== startVal) {
                    currentNum = startVal;
                    // Hitta närmaste tidigare primtal för att få ett korrekt första gap
                    lastPrime = findPreviousPrime(currentNum);
                }
                running = true;
                document.getElementById('startBtn').innerText = "Pausa";
                document.getElementById('startBtn').style.background = "#dc3545";
                interval = setInterval(generateNext, 20);
            } else {
                running = false;
                document.getElementById('startBtn').innerText = "Starta";
                document.getElementById('startBtn').style.background = "#007bff";
                clearInterval(interval);
            }
        }

        function findPreviousPrime(n) {
            for (let i = n - 1; i >= 2; i--) {
                if (isPrime(i)) return i;
            }
            return 2;
        }

        function exportToCSV() {
            if (exportData.length === 0) return;
            let csvContent = "data:text/csv;charset=utf-8,Index,Primtal,Gap\n";
            exportData.forEach(row => { csvContent += `${row.index},${row.prime},${row.gap}\n`; });
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "primtalsdata.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
